<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>China Sourcing Map | WorldFirst</title>
<style>
:root{
  --wf-red:#FF0051; --wf-red-hover:#E0004A;
  --text:#1F2323; --text-secondary:#484F56; --text-muted:#69727D;
  --bg:#FFFFFF; --border:#ECEDEE;
  --sys:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --safe-right:env(safe-area-inset-right, 0px);
  --safe-left:env(safe-area-inset-left, 0px);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1F2323}
body{font-family:var(--sys);color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:var(--sys);cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
a{color:inherit;text-decoration:none}

/* Dev banner — opt-in via ?dev=1 */
.dev-banner{display:none;background:#1F2323;color:#fff;font-size:11px;text-align:center;padding:5px 12px;position:fixed;top:0;left:0;right:0;z-index:50}
.dev-banner b{color:#FF7AA8}
.dev-banner a{color:#FF7AA8;text-decoration:underline;margin:0 3px}
body.dev .dev-banner{display:block}
body.dev .pdf-iframe{top:24px}
body.dev .menu-btn,body.dev .nav-panel{top:calc(var(--safe-top) + 36px)}

/* PDF iframe fills viewport */
.pdf-iframe{position:fixed;inset:0;width:100%;height:100%;border:none;background:#1F2323}

/* Floating menu button — top-right */
.menu-btn{position:fixed;top:calc(var(--safe-top) + 12px);right:calc(var(--safe-right) + 12px);width:42px;height:42px;background:rgba(255,255,255,.96);border-radius:50%;box-shadow:0 4px 14px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;color:var(--text);z-index:30;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:transform .15s ease,background .15s ease}
.menu-btn:hover{background:#fff;transform:scale(1.04)}
.menu-btn:active{transform:scale(.97)}
.menu-btn svg{width:18px;height:18px}
.menu-btn .icon-close{display:none}
body.menu-open .menu-btn .icon-menu{display:none}
body.menu-open .menu-btn .icon-close{display:block}

.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;transition:background .25s ease;z-index:20}
body.menu-open .backdrop{background:rgba(0,0,0,.32);pointer-events:auto}

/* Nav panel — slides from top-right */
.nav-panel{position:fixed;top:calc(var(--safe-top) + 12px);right:calc(var(--safe-right) + 12px);width:min(320px,calc(100vw - 24px));max-height:calc(100vh - var(--safe-top) - var(--safe-bottom) - 36px);background:#fff;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.32);transform-origin:top right;transform:scale(.85) translateY(-10px);opacity:0;pointer-events:none;transition:transform .22s cubic-bezier(.2,.8,.3,1.1),opacity .18s ease;z-index:31;overflow:hidden;display:flex;flex-direction:column}
body.menu-open .nav-panel{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}
.nav-panel-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.nav-panel-head .logo{width:24px;height:24px;background:var(--wf-red);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.nav-panel-head .title-name{font-weight:700;font-size:14px;color:var(--text)}
.nav-panel-head .title-sub{font-size:11px;color:var(--text-muted);margin-top:1px}

.chapter-section-label{padding:12px 18px 4px;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.chapter-list{flex:1;min-height:0;overflow-y:auto;padding:0 8px 12px;-webkit-overflow-scrolling:touch}
.chapter-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .12s ease;color:var(--text);font-size:14px}
.chapter-item:hover{background:#F5F5F5}
.chapter-item.active{background:#FFE9F1;color:var(--wf-red);font-weight:600}
.chapter-item .ch-page{margin-left:auto;font-family:ui-monospace,Menlo,Monaco,monospace;font-size:11.5px;color:var(--text-muted)}
.chapter-item.active .ch-page{color:var(--wf-red);opacity:.8}

/* Floating CTA — small pill, bottom-right */
.float-cta{position:fixed;bottom:calc(var(--safe-bottom) + 14px);right:calc(var(--safe-right) + 12px);background:var(--wf-red);color:#fff;font-weight:600;font-size:13.5px;padding:11px 16px 11px 18px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(255,0,81,.42),0 2px 6px rgba(0,0,0,.18);z-index:25;transition:all .2s ease;max-width:calc(100vw - 24px);text-decoration:none;cursor:pointer}
.float-cta:hover{background:var(--wf-red-hover);transform:translateY(-2px)}
.float-cta:active{transform:translateY(0)}
.float-cta svg{width:14px;height:14px;flex-shrink:0}
.float-cta-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

@media(max-width:640px){
  .menu-btn{width:40px;height:40px}
  .float-cta{font-size:13px;padding:10px 14px 10px 16px}
}
</style>
</head>
<body>

<div class="dev-banner">
  DEV: <a href="?dev=1&chapter=guangzhou">guangzhou</a>·<a href="?dev=1&chapter=shenzhen">shenzhen</a>·<a href="?dev=1&chapter=foshan">foshan</a>·<a href="?dev=1&chapter=yiwu">yiwu</a>·<a href="?dev=1&chapter=canton-fair">canton-fair</a>·<a href="?dev=1&chapter=1688">1688</a>·<a href="?dev=1">default</a>
</div>

<iframe class="pdf-iframe" id="pdf-iframe" src="assets/pdfjs/web/viewer.html#zoom=page-width" title="China Sourcing Map" allow="fullscreen"></iframe>

<div class="backdrop" id="backdrop"></div>

<button class="menu-btn" id="menu-btn" aria-label="Open menu">
  <svg class="icon-menu" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  <svg class="icon-close" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
</button>

<aside class="nav-panel" id="nav-panel" aria-label="Map navigation">
  <div class="nav-panel-head">
    <div class="logo">W</div>
    <div>
      <div class="title-name">China Sourcing Map</div>
      <div class="title-sub">WorldFirst · 328 pages</div>
    </div>
  </div>
  <div class="chapter-section-label">Jump to chapter</div>
  <div class="chapter-list" id="chapter-list"></div>
</aside>

<a href="#" class="float-cta" id="float-cta" target="_blank" rel="noopener" aria-label="Open WorldFirst">
  <span class="float-cta-text" id="float-cta-text">Pay in yuan</span>
  <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</a>

<script>
/* ===== CHAPTER MAP ===== */
const CHAPTER_MAP = {
  "default":               { label:"The full map",          page:1,   cta:"Pay in yuan",          url_tag:"default" },
  "guangzhou":             { label:"Guangzhou",             page:36,  cta:"Pay factory direct",   url_tag:"guangzhou" },
  "canton-fair":           { label:"Canton Fair area",      page:37,  cta:"Pay same-day",         url_tag:"canton-fair" },
  "shenzhen":              { label:"Shenzhen",              page:43,  cta:"Pay in yuan",          url_tag:"shenzhen" },
  "dongguan":              { label:"Dongguan",              page:49,  cta:"Pay same-day",         url_tag:"dongguan" },
  "zhongshan":             { label:"Zhongshan",             page:56,  cta:"Pay direct",           url_tag:"zhongshan" },
  "foshan":                { label:"Foshan",                page:61,  cta:"Skip the markup",      url_tag:"foshan" },
  "shanghai":              { label:"Shanghai",              page:80,  cta:"Pay same-day",         url_tag:"shanghai" },
  "yiwu":                  { label:"Yiwu",                  page:87,  cta:"Pay 1688 direct",      url_tag:"yiwu" },
  "danyang":               { label:"Danyang",               page:99,  cta:"Skip the broker",      url_tag:"danyang" },
  "quanzhou":              { label:"Quanzhou",              page:114, cta:"Pay direct, no agent", url_tag:"quanzhou" },
  "xiamen":                { label:"Xiamen",                page:123, cta:"Pay in yuan",          url_tag:"xiamen" },
  "qingdao":               { label:"Qingdao",               page:168, cta:"Pay same-day",         url_tag:"qingdao" },
  "chongqing":             { label:"Chongqing",             page:205, cta:"Pay direct in yuan",   url_tag:"chongqing" },
  "chengdu":               { label:"Chengdu",               page:213, cta:"Pay same-day",         url_tag:"chengdu" },
  "1688":                  { label:"Paying via 1688",       page:255, cta:"Pay 1688 direct",      url_tag:"1688" },
  "payment":               { label:"Payment rails by city", page:270, cta:"Right rail per city",  url_tag:"payment" },
  "supplier-verification": { label:"Supplier verification", page:300, cta:"Pay verified suppliers", url_tag:"supplier-verification" }
};
const CTA_BASE = "https://www.worldfirst.com/uk/product/pay/pay-chinese-suppliers/?utm_source=csm&utm_medium=floatingcta&utm_campaign=csm_redistribution&utm_content=";

const params = new URLSearchParams(window.location.search);
const chapterKey = (params.get('chapter') || 'default').toLowerCase();
const initialChapter = CHAPTER_MAP[chapterKey] || CHAPTER_MAP['default'];
if (params.get('dev') === '1') document.body.classList.add('dev');

const state = { pdfApp: null, activeChapter: chapterKey, currentPage: initialChapter.page };
const iframe = document.getElementById('pdf-iframe');
const ctaEl = document.getElementById('float-cta');
const ctaTextEl = document.getElementById('float-cta-text');

/* ===== Set initial page via URL fragment ===== */
iframe.src = `assets/pdfjs/web/viewer.html#page=${initialChapter.page}&zoom=page-width`;

/* ===== CTA wiring ===== */
function syncCta(key) {
  const c = CHAPTER_MAP[key] || CHAPTER_MAP['default'];
  ctaTextEl.textContent = c.cta;
  ctaEl.setAttribute('href', CTA_BASE + c.url_tag);
}
syncCta(chapterKey);
ctaEl.addEventListener('click', () => {
  const c = CHAPTER_MAP[state.activeChapter] || CHAPTER_MAP['default'];
  const eventData = { chapter: state.activeChapter, page: state.currentPage, cta: c.cta, destination: ctaEl.href };
  console.log('[CSM CTA click]', eventData);
  if (typeof fbq !== 'undefined') fbq('trackCustom', 'CSM_FloatingCTA_Click', eventData);
  if (typeof gtag !== 'undefined') gtag('event', 'csm_floating_cta_click', eventData);
});

/* ===== Listen to PDF.js page changes to auto-update active chapter ===== */
iframe.addEventListener('load', () => {
  const iWin = iframe.contentWindow;
  // Wait for PDFViewerApplication to be ready
  const tryHook = () => {
    if (!iWin.PDFViewerApplication || !iWin.PDFViewerApplication.initializedPromise) {
      setTimeout(tryHook, 80);
      return;
    }
    iWin.PDFViewerApplication.initializedPromise.then(() => {
      state.pdfApp = iWin.PDFViewerApplication;
      // Listen for page changes
      state.pdfApp.eventBus.on('pagechanging', e => {
        state.currentPage = e.pageNumber;
        updateActiveChapterFromPage(e.pageNumber);
      });
    });
  };
  tryHook();
});

function updateActiveChapterFromPage(num) {
  const sorted = Object.entries(CHAPTER_MAP)
    .filter(([k]) => k !== 'default')
    .sort((a,b) => a[1].page - b[1].page);
  let active = 'default';
  for (const [k, v] of sorted) {
    if (num >= v.page) active = k;
    else break;
  }
  if (active !== state.activeChapter) {
    state.activeChapter = active;
    syncCta(active);
    document.querySelectorAll('.chapter-item').forEach(el => {
      el.classList.toggle('active', el.dataset.key === active);
    });
  }
}

/* ===== Menu open/close ===== */
const menuBtn = document.getElementById('menu-btn');
const backdrop = document.getElementById('backdrop');
const navPanel = document.getElementById('nav-panel');
function closeMenu(){ document.body.classList.remove('menu-open'); }
function toggleMenu(){ document.body.classList.toggle('menu-open'); }
menuBtn.addEventListener('click', toggleMenu);
backdrop.addEventListener('click', closeMenu);
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

/* ===== Populate chapter list ===== */
const chapterList = document.getElementById('chapter-list');
const sortedChapters = Object.entries(CHAPTER_MAP).sort((a,b) => a[1].page - b[1].page);
sortedChapters.forEach(([key, c]) => {
  const item = document.createElement('div');
  item.className = 'chapter-item' + (key === state.activeChapter ? ' active' : '');
  item.dataset.key = key;
  item.innerHTML = `<span>${c.label}</span><span class="ch-page">p.${c.page}</span>`;
  item.addEventListener('click', () => {
    if (state.pdfApp) {
      state.pdfApp.page = c.page;  // PDF.js API — instant page jump, no reload
    } else {
      iframe.src = `assets/pdfjs/web/viewer.html#page=${c.page}&zoom=page-width`;
    }
    closeMenu();
  });
  chapterList.appendChild(item);
});
</script>

</body>
</html>
